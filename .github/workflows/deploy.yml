name: Deploy to Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Cargar IP del Registry
        run: |
          source /opt/registry_ip.txt
          echo "REGISTRY_IP=${REGISTRY_IP}" >> $GITHUB_ENV

      - name: Desplegar con Docker Compose
        run: |
          cd /opt/app
          REGISTRY_IP=${REGISTRY_IP} docker-compose down || true
          REGISTRY_IP=${REGISTRY_IP} docker-compose pull
          REGISTRY_IP=${REGISTRY_IP} docker-compose up -d

      - name: Verificar servicios
        run: |
          sleep 5
          docker ps
          echo " App: http://localhost:8080"
          echo " Adminer: http://localhost:8081"