version: '3.8'

services:
  postgres-dev:
    image: postgres:15
    container_name: postgres_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: devops
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer-dev:
    image: adminer
    container_name: adminer_dev
    ports:
      - "8081:8080"
    depends_on:
      - postgres-dev
    restart: unless-stopped

  backend-dev:
    image: ${REGISTRY_IP}:5000/springboot-app:latest
    container_name: app-container
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-dev:5432/devops
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - postgres-dev
    restart: unless-stopped

volumes:
  postgres_dev_data: