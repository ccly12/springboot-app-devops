name: Deploy to Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Cargar IP del Registry
        run: |
          source /opt/registry_ip.txt
          echo "REGISTRY_IP=${REGISTRY_IP}" >> $GITHUB_ENV

      - name: Pull de la imagen desde Registry
        run: |
          docker pull ${REGISTRY_IP}:5000/springboot-app:latest

      - name: Detener contenedor actual
        run: |
          docker stop app-container || true
          docker rm app-container || true

      - name: Desplegar nuevo contenedor
        run: |
          docker run -d \
            --name app-container \
            -p 8080:8080 \
            --restart unless-stopped \
            ${REGISTRY_IP}:5000/springboot-app:latest

      - name: Verificar despliegue
        run: |
          sleep 5
          docker ps | grep app-container
          echo "✅ App desplegada en puerto 8080"